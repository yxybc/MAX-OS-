    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --primary: #007aff;
            --card: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f0f;
                --text: #f5f5f7;
                --primary: #409eff;
                --card: #1a1a1a;
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* 顶部导航 */
        nav {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 20px;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
        }

        /* 主标题区域 */
        .hero {
            text-align: center;
            padding: 80px 20px 60px;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .hero p {
            font-size: 22px;
            opacity: 0.8;
        }

        /* 内容区域 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .card h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 20px;
            margin: 30px 0 16px;
        }

        .card p {
            font-size: 17px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.03);
        }
    </style>
</head>
